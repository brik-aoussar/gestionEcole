# Configuration de l'application Gestion des Notes
# ================================================

# Base de donnees MySQL
# Modifier ces valeurs selon votre configuration
# Decommenter les lignes ci-dessous pour utiliser une configuration personnalisee
# ou laisser commente pour utiliser les valeurs par defaut du code

# URL de connexion MySQL
# db.url=jdbc:mysql://localhost:3306/gestion_ecole?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Africa/Casablanca&useSSL=false

# Identifiants MySQL
# db.user=root
# db.password=root

# Configuration du pool de connexions
# db.pool.max=10
# db.pool.min=2

# ============================================================
# VALEURS PAR DEFAUT (utilisees si les lignes ci-dessus sont commentees)
# ============================================================
# URL: jdbc:mysql://localhost:3306/gestion_ecole?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Africa/Casablanca
# User: root
# Password: root
# Pool max: 10
# Pool min: 2

# ============================================================
# POUR MODIFIER LES CREDENTIALS:
# 1. Decommenter les lignes db.user et db.password ci-dessus
# 2. Modifier les valeurs
# 3. Recompiler: mvn clean install
# ============================================================

# Database Configuration
db.url=jdbc:mysql://localhost:3306/gestion_ecole?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=root
db.driver=com.mysql.cj.jdbc.Driver

# Pool settings
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.timeout=30000

# Export paths
export.pdf.path=./exports/pdf/
export.excel.path=./exports/excel/
