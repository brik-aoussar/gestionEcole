# Configuration de l'application Gestion des Notes
# ================================================

# Base de donnees MySQL
# Modifier ces valeurs selon votre configuration

# URL de connexion MySQL
# FIXED: parametres complets et coherents avec AppConfig
# useSSL=false pour dev local, allowPublicKeyRetrieval=true pour MySQL 8+
# serverTimezone=UTC ou Africa/Casablanca
# characterEncoding=utf8mb4 pour support Unicode complet

db.url=jdbc:mysql://localhost:3306/gestion_ecole?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Africa/Casablanca&useSSL=false&allowPublicKeyRetrieval=true

# Identifiants MySQL
db.user=root
db.password=root

# Driver MySQL
db.driver=com.mysql.cj.jdbc.Driver

# Configuration du pool de connexions
# FIXED: cles coherentes avec DatabaseConnection.java (maxSize/minIdle/timeout)
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.timeout=30000

# ============================================================
# Chemins d'export
# FIXED: cles coherentes avec AppConfig.java (pdf.path / excel.path)
# ============================================================
export.path=exports/
export.pdf.path=exports/pdf/
export.excel.path=exports/excel/

# Application
app.name=Gestion des Notes
app.version=2.0.0
app.page.size=50
